<svg xmlns="http://www.w3.org/2000/svg" width="800" height="800" viewBox="0 0 800 800">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8D5C4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F5EFE7;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="800" fill="url(#bgGradient)"/>

  <!-- Decorative circle -->
  <circle cx="400" cy="350" r="180" fill="#8B9E7D" opacity="0.2"/>

  <!-- Silhouette placeholder -->
  <ellipse cx="400" cy="300" rx="100" ry="120" fill="#C17A5C" opacity="0.3"/>
  <ellipse cx="400" cy="550" rx="150" ry="200" fill="#C17A5C" opacity="0.3"/>

  <!-- Text -->
  <text x="400" y="720" text-anchor="middle" font-family="serif" font-size="24" fill="#3D4B3A" opacity="0.6">Photo Coming Soon</text>
</svg>
